x-app-env: &app_env
  NODE_ENV: production
  DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-1234}@postgres:5432/${POSTGRES_DB:-market}?schema=public
  NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
  NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-3f7ed45c5a5b7f6af6bf668f6f9799fcd9b98de62f3c32f457f6d6f13bdf3b09}
  APP_BASE_URL: ${APP_BASE_URL:-http://localhost:3000}
  NEXT_PUBLIC_PRIORITY_CURRENCIES: ${NEXT_PUBLIC_PRIORITY_CURRENCIES:-EUR,USD,CNY}
  NEXT_PUBLIC_PRIORITY_COUNTRIES: ${NEXT_PUBLIC_PRIORITY_COUNTRIES:-FI,US,CN}
  AP_INSTANCE_DOMAIN: ${AP_INSTANCE_DOMAIN:-localhost:3000}
  AP_LISTINGS_ACTOR: ${AP_LISTINGS_ACTOR:-listings}
  AP_PRIVATE_KEY_PEM: ${AP_PRIVATE_KEY_PEM}
  AP_PUBLIC_KEY_PEM: ${AP_PUBLIC_KEY_PEM}
  AP_FEDERATION_TARGETS: ${AP_FEDERATION_TARGETS:-}
  S3_REGION: ${S3_REGION:-us-east-1}
  S3_ENDPOINT: ${S3_ENDPOINT_INTERNAL:-http://minio:9000}
  S3_BUCKET: ${S3_BUCKET:-market-listings}
  S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-minioadmin}
  S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-minioadmin}
  S3_PUBLIC_BASE_URL: ${S3_PUBLIC_BASE_URL:-http://localhost:9000/market-listings}
  ALLOW_LOCAL_UPLOAD_FALLBACK: ${ALLOW_LOCAL_UPLOAD_FALLBACK:-false}
  ADMIN_ACTOR_URIS: ${ADMIN_ACTOR_URIS:-}

services:
  postgres:
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-1234}
      POSTGRES_DB: ${POSTGRES_DB:-market}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d market"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY_ID:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_ACCESS_KEY:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  minio-init:
    image: minio/mc:latest
    restart: "no"
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${S3_ACCESS_KEY_ID:-minioadmin} ${S3_SECRET_ACCESS_KEY:-minioadmin} &&
      mc mb --ignore-existing local/${S3_BUCKET:-market-listings} &&
      mc anonymous set public local/${S3_BUCKET:-market-listings} &&
      exit 0
      "

  app:
    build:
      context: .
      target: web
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    environment: *app_env
    ports:
      - "3000:3000"

  worker:
    build:
      context: .
      target: worker
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      app:
        condition: service_started
    environment: *app_env
    healthcheck:
      test: ["CMD-SHELL", "npm run worker:health:prod"]
      interval: 15s
      timeout: 10s
      retries: 5

volumes:
  postgres_data:
  minio_data:
